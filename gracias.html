<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gracias | Glow Leaders</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="gracias-page">

  <section class="gracias-section">
    <div class="gracias-box">

      <h1 
        data-es="¡Gracias por registrarte!"
        data-en="Thank you for registering!"
      >
        ¡Gracias por registrarte!
      </h1>

      <p
        data-es="Tu asesor se pondrá en contacto contigo muy pronto para organizar tu experiencia Glow Leaders."
        data-en="Your advisor will contact you very soon to organize your Glow Leaders experience."
      >
        Tu asesor se pondrá en contacto contigo muy pronto para organizar tu experiencia Glow Leaders.
      </p>

      <p
        data-es="No pierdas la oportunidad de tu sesión 2x1 en el ritual coreano. Las plazas son limitadas cada semana."
        data-en="Don't miss your 2x1 Korean ritual session. Limited spots available each week."
      >
        No pierdas la oportunidad de tu sesión 2x1 en el ritual coreano. Las plazas son limitadas cada semana.
      </p>

      <a href="index.html" class="btn-rutina"
        data-es="VOLVER A LA PÁGINA"
        data-en="BACK TO WEBSITE"
      >
        VOLVER A LA PÁGINA
      </a>

    </div>
  </section>

  <!-- SCRIPT IDIOMA -->
  <script>
    const translatableElements = document.querySelectorAll('[data-es][data-en]');
    const savedLang = localStorage.getItem('lang') || 'es';

    function setLanguage(lang) {
      document.documentElement.lang = lang;

      translatableElements.forEach(el => {
        const text = el.getAttribute(`data-${lang}`);
        if (text) el.textContent = text;
      });
    }

    setLanguage(savedLang);
  </script>

</body>
</html>
