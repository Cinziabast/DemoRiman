<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gracias | Glow Leaders</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --cream: #f8f6f2;
      --white: #ffffff;
      --gold: #c7a86b;
      --text: #2f2f2f;
      --muted: #6f6f6f;
      --shadow: 0 10px 35px rgba(0,0,0,0.08);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px 16px;
    }

    .thankyou-card {
      width: 100%;
      max-width: 760px;
      background: var(--white);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 48px 32px;
      text-align: center;
    }

    .logo {
      width: 120px;
      margin: 0 auto 24px;
      display: block;
    }

    .label {
      font-size: 0.85rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 12px;
      font-weight: 600;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.4rem;
      margin-bottom: 18px;
    }

    .message {
      font-size: 1.05rem;
      line-height: 1.8;
      color: var(--muted);
      max-width: 620px;
      margin: 0 auto 18px;
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      border-radius: 999px;
      padding: 14px 24px;
      font-weight: 600;
      border: 1px solid rgba(0,0,0,0.12);
      color: var(--text);
      background: transparent;
      margin-top: 20px;
    }

    .btn:hover {
      background: rgba(0,0,0,0.03);
    }
  </style>
</head>

<body>
  <main class="thankyou-card">
    <img src="logoriman.webp" alt="Logo Riman" class="logo" />

    <p class="label">Glow Leaders</p>

    <h1
      data-es="¡Gracias por registrarte!"
      data-en="Thank you for registering!"
    >
      ¡Gracias por registrarte!
    </h1>

    <p
      class="message"
      data-es="En breve recibirás un email con los próximos pasos para beneficiarte de tu ritual coreano de skincare."
      data-en="You will shortly receive an email with the next steps to enjoy your Korean skincare ritual."
    >
      En breve recibirás un email con los próximos pasos para beneficiarte de tu ritual coreano de skincare.
    </p>

    <p
      class="message"
      data-es="También recibirás la información de tu asesor para continuar tu experiencia."
      data-en="You will also receive the contact details of your advisor to continue your experience."
    >
      También recibirás la información de tu asesor para continuar tu experiencia.
    </p>

    <p
      class="message"
      data-es="Revisa tu bandeja de entrada, promociones o spam."
      data-en="Check your inbox, promotions tab or spam folder."
    >
      Revisa tu bandeja de entrada, promociones o spam.
    </p>

    <a
      href="index.html"
      class="btn btn-primary"
      data-es="Volver a la landing"
      data-en="Back to landing page"
    >
      Volver a la landing
    </a>
  </main>

  <!-- Script cambio idioma -->
  <script>
    const lang = localStorage.getItem('lang') || 'es';
    const elements = document.querySelectorAll('[data-es][data-en]');

    elements.forEach(el => {
      el.textContent = el.getAttribute(`data-${lang}`);
    });
  </script>
</body>
</html>
